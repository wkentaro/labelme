---
name: discord-notify
on:
  pull_request:
    types: [closed]
    branches: [main]
jobs:
  notify:
    if: |
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.title, 'feat: ') ||
       startsWith(github.event.pull_request.title, 'feat('))
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |-
          if [[ -z "$DISCORD_WEBHOOK" ]]; then
            echo "Error: DISCORD_WEBHOOK secret not configured"
            exit 1
          fi
          TYPE="🎉 **New feature merged!** Try it in the next release"
          COLOR=3066993
          MILESTONE="${{ github.event.pull_request.milestone.title }}"
          if [[ -z "$MILESTONE" ]]; then
            MILESTONE="None"
          fi
          TITLE_ESCAPED=$(printf '%s' "$PR_TITLE" | jq -Rs .)
          # Keep only the "## Summary" body: drop that heading and stop at the
          # next heading of any kind, so trailing sections (Note for review,
          # Test plan, etc.) are dropped. Strip CRLF before awk so the heading
          # anchors match. Cap well under Discord's 4096 limit.
          BODY_ESCAPED=$(printf '%s' "$PR_BODY" | tr -d '\r' | awk '
            /^#+ +[Ss]ummary *$/ { next }
            /^#+ +/ { exit }
            { print }
          ' | jq -Rs '
            sub("^[[:space:]]+"; "") | sub("[[:space:]]+$"; "")
            | if . == "" then "No description provided"
              elif length > 1800 then .[0:1797] + "..."
              else . end')
          curl -fsS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"$TYPE\",
              \"embeds\": [{
                \"title\": $TITLE_ESCAPED,
                \"url\": \"${{ github.event.pull_request.html_url }}\",
                \"color\": $COLOR,
                \"description\": $BODY_ESCAPED,
                \"fields\": [
                  {
                    \"name\": \"Pull request\",
                    \"value\": \"[#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Milestone\",
                    \"value\": \"$MILESTONE\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"💬 Feedback\",
                    \"value\": \"[Share your thoughts](https://github.com/wkentaro/labelme/discussions)\",
                    \"inline\": true
                  }
                ]
              }]
            }"
